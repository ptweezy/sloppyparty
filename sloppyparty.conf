# sloppyparty branding config
# pass this to the server with:  copyparty -c sloppyparty.conf
# (or: sloppyparty -c sloppyparty.conf)
#
# this rebrands the entire user-facing web UI at runtime, so we never
# have to edit the high-churn source files that upstream changes often
# (browser.js/splash.html/__main__.py) -> near-zero merge conflicts.

[global]
  name: sloppyparty                                  # top-left corner label, mDNS/zeroconf, og:site_name
  doctitle: sloppyparty                              # browser-tab title (REQUIRED: default is "copyparty @ --name")
  name-url: https://github.com/ptweezy/sloppyparty   # makes the corner name a link to the fork
  nb                                                 # remove the "powered by copyparty" footer entirely
  favico: S fc5 222                                  # favicon: glyph "S", fg #fc5, bg #222
  og-site: sloppyparty                               # social/embed link previews

  # --- optional flavor ---
  # ufavico: /.cpr/brand-logo.svg   # real image favicon instead of the glyph (blank out `favico` first)
  # html-head: @/cfg/head.html      # inject brand CSS / <link rel=icon> / logo into every page's <head>
  # css-browser: /.cpr/brand.css    # extra stylesheet for the file-browser page
  # theme: 2                        # default color theme
  # spinner: 🎉                      # loading-spinner glyph
